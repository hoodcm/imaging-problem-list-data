version: "3.44"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install Python + Node dependencies for local development
    cmds:
      - task: setup:py
      - task: setup:web

  setup:py:
    desc: Sync Python dependencies into .venv (including dev tools)
    preconditions:
      - sh: command -v uv >/dev/null 2>&1
        msg: uv is required (https://docs.astral.sh/uv/getting-started/installation/)
    cmds:
      - uv sync --dev

  setup:web:
    desc: Install Node dependencies for web linting/deploy tooling
    preconditions:
      - sh: command -v npm >/dev/null 2>&1
        msg: npm is required (install Node.js)
    cmds:
      - /bin/sh -ec 'mkdir -p .cache/npm && npm ci --cache .cache/npm --include=dev --no-audit --no-fund --loglevel=error'

  lint:
    desc: Run lint checks (python + web + web format + json + toml + migration drift)
    cmds:
      - task: lint:py
      - task: lint:web
      - task: format:web:check
      - task: lint:json
      - task: lint:toml
      - task: db:check

  lint:py:
    desc: Run Python lint checks (ruff + ty)
    cmds:
      - uv run ruff check src tests
      - uv run ty check src tests

  lint:web:
    desc: Run JS/TS/HTML lint checks
    cmds:
      - npm --silent run lint:web

  format:web:
    desc: Format JS/TS/CSS/HTML with Prettier
    cmds:
      - npm --silent run format:web

  format:web:check:
    desc: Check JS/TS/CSS/HTML formatting with Prettier
    cmds:
      - npm --silent run format:web:check

  lint:json:
    desc: Run JSON lint checks (syntax + duplicate keys)
    cmds:
      - uv run python scripts/lint_json.py

  lint:toml:
    desc: Run TOML lint checks (syntax)
    cmds:
      - uv run python scripts/lint_toml.py

  test:
    desc: Run lean core tests (unit only)
    cmds:
      - task: test:unit

  test:unit:
    desc: Run backend unit/component tests (no Docker/services)
    cmds:
      - uv run pytest tests/test_store.py tests/test_api.py tests/test_tasks.py tests/test_extraction_orchestrator.py tests/test_semantic_chunking.py tests/test_migrations.py tests/test_config.py tests/test_model_catalog.py tests/test_model_policy.py tests/test_model_resilience.py tests/test_extraction.py tests/test_extraction_runtime.py tests/test_prompt.py tests/test_chunk_prompt.py tests/test_cli.py tests/test_batch_cli.py tests/test_models.py tests/test_logging_setup.py tests/test_eval_matching.py tests/test_eval_evaluators.py tests/test_eval_cli.py tests/test_eval_datasets.py tests/test_report_sections.py tests/test_exam_info_agent.py tests/test_extraction_review.py tests/test_presets.py tests/test_impression_list_chunker.py

  test:ui:
    desc: Run Playwright UI tests (excluded from default test run)
    cmds:
      - uv run pytest -m ui tests/test_ui.py -v

  test:smoke:
    desc: Run backend smoke test against a running API (defaults to fast model; all SMOKE_* vars overrideable)
    cmds:
      - /bin/sh -ec 'SMOKE_MODEL="${SMOKE_MODEL:-openai:gpt-5-nano}" SMOKE_REASONING="${SMOKE_REASONING:-minimal}" uv run python -m finding_extractor.smoke'

  test:integration:
    desc: Run full-stack integration tests (Docker + real provider credentials)
    cmds:
      - uv run pytest -m integration -v

  eval:smoke:
    desc: Run smoke eval dataset (fast, CI-safe)
    cmds:
      - uv run --env-file .env finding-extractor-eval run
          --dataset smoke
          --model "${MODEL:-openai:gpt-5-mini}"
          --reasoning "${REASONING:-medium}"
          --workers "${WORKERS:-2}"
          --threshold-f1 0.5
          --threshold-presence 0.7
          --threshold-verbatim

  eval:comprehensive:
    desc: Run comprehensive evaluation (9 cases, ~5 min)
    cmds:
      - uv run --env-file .env finding-extractor-eval run
          --dataset comprehensive
          --model "${MODEL:-openai:gpt-5-mini}"
          --reasoning "${REASONING:-medium}"
          --workers "${WORKERS:-2}"
          --threshold-f1 0.5
          --threshold-presence 0.7
          --threshold-verbatim

  eval:schema:
    desc: Regenerate eval dataset JSON Schema from Python types
    cmds:
      - uv run python -c "from finding_extractor.eval.datasets import EvalDataset; import json; print(json.dumps(EvalDataset.model_json_schema(), indent=2))" > evals/datasets/comprehensive_schema.json

  extract:example3:
    desc: Batch extract sample_data/example3 to *.extracted.json using batch CLI
    cmds:
      - uv run --env-file .env finding-extractor-batch run sample_data/example3 --glob "*.txt" --workers "${WORKERS:-4}" --model "${MODEL:-openai:gpt-5-mini}" --reasoning "${REASONING:-medium}" --validate --resume --mode interactive --allow-slow

  stack:up:
    desc: Start backend docker stack (redis/api/worker) with DB migration preflight
    cmds:
      - docker compose build api worker
      - docker compose up -d --wait redis
      - task: db:migrate:auto:stack
      - docker compose up -d --wait api worker

  stack:up:full:
    desc: Start full docker stack (caddy/redis/api/worker) with DB migration preflight
    cmds:
      - docker compose build api worker caddy
      - docker compose up -d --wait redis
      - task: db:migrate:auto:stack
      - docker compose up -d --wait api worker caddy

  stack:down:
    desc: Stop backend docker stack
    cmds:
      - docker compose down

  db:migrate:
    desc: Apply Alembic migrations to head (DB path from IPL_DB_PATH or default)
    cmds:
      - uv run alembic upgrade head

  db:current:
    desc: Show current Alembic revision
    cmds:
      - uv run alembic current

  db:heads:
    desc: Show Alembic heads (should be a single head)
    cmds:
      - uv run alembic heads

  db:revision:
    desc: Create new autogen migration (pass MSG='description')
    cmds:
      - uv run alembic revision --autogenerate -m "{{.MSG}}"

  db:stamp:baseline:
    desc: Stamp existing pre-Alembic DB as baseline (no schema changes applied)
    cmds:
      - uv run alembic stamp 3d867b54ee78

  db:check:
    desc: Migration drift check on ephemeral SQLite DB
    cmds:
      - /bin/sh -ec 'DB_PATH=$(mktemp /tmp/finding_extractor_migration_check.XXXXXX); trap "rm -f $DB_PATH" EXIT; IPL_DB_PATH="$DB_PATH" uv run alembic upgrade head; IPL_DB_PATH="$DB_PATH" uv run alembic check'

  db:migrate:stack:
    desc: Apply migrations inside Docker Compose API container (/data volume)
    cmds:
      - docker compose run --rm api uv run alembic upgrade head

  db:migrate:auto:stack:
    desc: Apply stack migrations; auto-stamp baseline when upgrading a pre-Alembic DB
    cmds:
      - /bin/sh -ec 'set -e; LOG_FILE=$(mktemp /tmp/ipl_stack_migrate.XXXXXX); trap "rm -f \"$LOG_FILE\"" EXIT; if docker compose run --rm api uv run alembic upgrade head >"$LOG_FILE" 2>&1; then cat "$LOG_FILE"; exit 0; fi; cat "$LOG_FILE"; if rg -q "table reports already exists" "$LOG_FILE"; then echo "Detected pre-Alembic stack DB; stamping baseline then upgrading to head."; docker compose run --rm api uv run alembic stamp 3d867b54ee78; docker compose run --rm api uv run alembic upgrade head; else exit 1; fi'

  db:stamp:baseline:stack:
    desc: Stamp existing pre-Alembic Docker DB as baseline (no schema changes applied)
    cmds:
      - docker compose run --rm api uv run alembic stamp 3d867b54ee78
