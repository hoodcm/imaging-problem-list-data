services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./extractor-ui:/srv:ro
    depends_on:
      api:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uv run finding-extractor-api
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      FINDING_EXTRACTOR_REDIS_URL: redis://redis:6379
      FINDING_EXTRACTOR_DB_PATH: /data/finding_extractor.db
    volumes:
      - finding_extractor_db:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/readyz')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  worker:
    build: .
    command: uv run taskiq worker finding_extractor.broker:broker finding_extractor.tasks
    env_file:
      - .env
    environment:
      FINDING_EXTRACTOR_REDIS_URL: redis://redis:6379
      FINDING_EXTRACTOR_DB_PATH: /data/finding_extractor.db
    volumes:
      - finding_extractor_db:/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  finding_extractor_db:
