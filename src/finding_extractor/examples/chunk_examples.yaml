  - id: ct_chest_20220922_impression_1
    source:
      report_markdown: sample_data/example2/ct_chest_20220922.md
      efl_json: sample_data/example2/ct_chest_20220922_efl.json
      section: impression
      chunk_label: impression_1
    target_chunk_text: |-
      1. **4 mm solid pulmonary nodule in the right lower lobe.** In a patient with no known malignancy and low risk factors, recommend follow-up CT in 12 months per Fleischner Society guidelines.

      2. Mild linear scarring in right lower lobe, sequela of prior pneumonia (June 2021).

      3. Borderline enlarged right hilar lymph nodes, largest 11 mm, likely reactive. No pathologic adenopathy.

    expected_response:
      findings:
        - finding_name: pulmonary nodule
          presence: present
          location:
            body_region: chest
            specific_anatomy: right lower lobe
            laterality: right
          attributes:
            - key: size
              value: 4 mm
          evidence_start: 3
          evidence_end: 59
          efl_reference:
            observation_id: pulmonary_nodule_1
            finding_description: solitary pulmonary nodule
            presence: present
            match_type: conceptual_alignment
        - finding_name: pulmonary scar
          presence: present
          location:
            body_region: chest
            specific_anatomy: right lower lobe
            laterality: right
          attributes:
            - key: etiology
              value: sequela of prior pneumonia
          evidence_start: 195
          evidence_end: 276
          efl_reference:
            observation_id: pulmonary_scarring_1
            finding_description: pulmonary scar
            presence: present
            match_type: conceptual_alignment
        - finding_name: hilar lymph node enlargement
          presence: present
          location:
            body_region: chest
            specific_anatomy: right hilum
            laterality: right
          attributes:
            - key: size
              value: 11 mm
            - key: characterization
              value: likely reactive
          evidence_start: 281
          evidence_end: 357
          efl_reference:
            observation_id: lymphadenopathy_1
            finding_description: mediastinal and/or hilar lymph node enlargement
            presence: present
            match_type: conceptual_alignment
    notes:
      - "The follow-up recommendation sentence is intentionally not represented as a finding."

