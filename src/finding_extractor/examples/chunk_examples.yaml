schema_version: v1
offset_convention: "0-based, end-exclusive"
notes:
  - "Examples are sourced from sample_data/example2 markdown reports."
  - "efl_reference fields map expected chunk findings to corresponding *_efl.json outputs."
  - "evidence_start/evidence_end indicate the supporting span inside target_chunk_text."

examples:
