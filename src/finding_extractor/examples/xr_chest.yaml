report_text: |-
  Chest Radiograph (PA and Lateral)

  Date of Exam: June 14, 2021

  Technique: Frontal and lateral views of the chest.

  Indication: 60-year-old male with fever, cough, and shortness of breath.

  Comparison: Chest radiograph, October 12, 2020.

  Findings:

  Lungs: There is a focal airspace opacity in the right lower lobe consistent with pneumonia. No cavitation. The left lung is clear. No pleural effusion or pneumothorax.

  Cardiomediastinal Silhouette: The heart size is normal. Mitral annular calcification is present. Mild coronary artery calcification. The mediastinal contours are unremarkable.

  Hila: Normal hilar contours bilaterally.

  Pleura: No pleural abnormality.

  Bones: An acute-appearing superior endplate compression fracture is present at T9. Healed fractures of the left 7th and 8th ribs are noted posterolaterally.

  Soft Tissues: Unremarkable.

  Impression:
  1. Right lower lobe pneumonia.
  2. Cardiac calcifications.
  3. Acute T9 compression fracture. Healed left rib fractures.
