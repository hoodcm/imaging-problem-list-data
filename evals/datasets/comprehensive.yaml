- name: xr_chest_20220315
  inputs:
    report_text: '**Chest Radiograph (PA and Lateral)**


      **Date of Exam:** March 15, 2022


      **Technique:**

      Frontal and lateral views of the chest.


      **Indication:**

      61-year-old male with chronic cough.


      **Comparison:**

      Chest radiograph, October 12, 2020.


      ---


      ### **Findings:**


      **Lungs:**

      The lungs are well expanded and clear. No focal consolidation, pleural effusion,
      or pneumothorax. No definite pulmonary nodule identified on radiograph.


      **Cardiomediastinal Silhouette:**

      The cardiac silhouette is normal in size. Prominent mitral annular calcification
      is visible. Calcification of the coronary arteries is noted. The mediastinal
      contours are within normal limits. The aortic knob is prominent with a tortuous
      descending thoracic aorta, compatible with atherosclerotic disease.


      **Hila:**

      The hila are normal in size and contour.


      **Pleura:**

      No pleural thickening or effusion.


      **Bones:**

      Extensive degenerative changes of the thoracic spine with flowing anterior osteophytes
      bridging multiple levels, consistent with diffuse idiopathic skeletal hyperostosis.
      An old superior endplate compression fracture at T9 is noted, now appearing
      chronic/healed compared to April 2006. Healed fractures of the left 7th and
      8th ribs are present posterolaterally with smooth callus formation. An old healed
      fracture of the left mid-clavicle is identified. Diffuse osteopenia is present.


      **Soft Tissues:**

      No soft tissue abnormality.


      ---


      ### **Impression:**


      1. No acute cardiopulmonary abnormality.


      2. Cardiac calcifications including mitral annular and coronary artery calcification.


      3. Extensive DISH with degenerative changes. Old T9 compression fracture, now
      chronic/healed. Healed left 7th and 8th rib fractures and left clavicular fracture.


      4. Diffuse osteopenia.

      '
